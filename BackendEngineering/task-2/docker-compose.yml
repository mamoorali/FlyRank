services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: a2user
      POSTGRES_PASSWORD: a2pass
      POSTGRES_DB: a2db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://a2user:a2pass@db:5432/a2db
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata: